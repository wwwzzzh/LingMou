server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_vision_assistant?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: your_mysql_password
  redis:
    host: localhost
    port: 6379
    password: your_redis_password

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

ai:
  asr-provider: mock
  tts-provider: mock
  vision-provider: mock

chat:
  max-round: 20
  summary-trigger: 20
  summary-keep-rounds: 10

rate-limit:
  max-requests: 20
  window-seconds: 60
